<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Product List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Featured Products</h1>
        <input type="text" id="search-input" placeholder="Search products...">
        <div class="cart-info">Cart: <span id="cart-count">0</span></div>
    </header>
    <main>
        <!-- Container for dynamic product list -->
        <div id="product-container" class="product-grid"></div>
    </main>
    <footer>
        <p>&copy; 2023 E-commerce Product List</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
